# M3: Dedicated ServiceAccount per workload (no automounted token)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "taskmanager.fullname" . }}-backend
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "taskmanager.fullname" . }}-frontend
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "taskmanager.fullname" . }}-postgres
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
automountServiceAccountToken: false
