apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "taskmanager.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.frontend.port }}
