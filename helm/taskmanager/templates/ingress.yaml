apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "taskmanager.fullname" . }}-ingress
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # S11: /admin/ is NOT in the public Ingress — access only inside cluster (kubectl port-forward)
    # S12: Force HTTP → HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # S13: HSTS is set globally in ingress-nginx ConfigMap (hsts: "true", hsts-max-age: "31536000", hsts-include-subdomains: "true")
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        - www.{{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tlsSecret }}
  rules:
    # S14: primary vhost
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /media/
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
    # S14: www vhost — mirrors primary (includes /api/ routing)
    - host: www.{{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /media/
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "taskmanager.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
