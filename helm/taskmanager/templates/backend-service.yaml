apiVersion: v1
kind: Service
metadata:
  name: {{ include "taskmanager.fullname" . }}-backend
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "taskmanager.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
