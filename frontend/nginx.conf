server {
    listen 8080;
    server_name _;

    # nginx.conf S2: hide Nginx version
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # nginx.conf B2: cap upload size (avatar uploads go via /api/; 10 MB is generous)
    client_max_body_size 10m;

    # nginx.conf B3: backend proxy timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # nginx.conf B4: keepalive upstream to backend
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Gzip
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # nginx.conf S1: Security headers
    add_header X-Frame-Options            "DENY"                always;
    add_header X-Content-Type-Options     "nosniff"             always;
    add_header X-XSS-Protection           "1; mode=block"       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self';" always;

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://taskmanager-backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy media files (user uploads) to the backend service
    # ^~ beats regex locations so the static-asset cache rule below won't intercept
    location ^~ /media/ {
        proxy_pass http://taskmanager-backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # nginx.conf S6: Cache hashed static assets aggressively, but NOT index.html
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
